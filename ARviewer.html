<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Dynamic AR Viewer</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs>
      <a-marker id="marker" type="pattern">
        <a-gltf-model id="model" scale="2 2 2" position="0 1 0" rotation="0 180 0"></a-gltf-model>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const modelName = urlParams.get('model');
      const markerName = urlParams.get('marker');
    
      // あなたのリポジトリURL
      const baseUrl = "https://raw.githubusercontent.com/miifu555/circleAR/main/";
    
      // モデルのセット
      if (modelName) {
        const modelEl = document.querySelector('#model');
        modelEl.setAttribute('src', baseUrl + modelName);
      }
    
      // マーカーのセット (.patt ファイル)
      if (markerName) {
        const markerEl = document.querySelector('#marker');
        // 重要：setAttribute('url', ...) で反映されない場合は以下を試してください
        markerEl.setAttribute('type', 'pattern');
        markerEl.setAttribute('url', baseUrl + markerName);
        
        console.log("Loading Marker:", baseUrl + markerName);
      }
    </script>
  </body>
</html>
