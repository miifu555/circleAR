<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Dynamic AR Viewer</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;">
      <a-marker id="marker" type="pattern">
        <a-gltf-model id="model" scale="1 1 1" position="0 1 0" rotation="0 0 0"></a-gltf-model>
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const modelName = urlParams.get('model');
      const markerName = urlParams.get('marker');

      if (modelName) {
        const modelEl = document.querySelector('#model');
        modelEl.setAttribute('src', modelName);
        console.log("Model set to:", modelName);
      }

      if (markerName) {
        const markerEl = document.querySelector('#marker');
        markerEl.setAttribute('url', markerName);
        console.log("Marker set to:", markerName);
      }
    </script>
  </body>
</html>
